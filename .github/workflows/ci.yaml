name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: concurrency-group::${{ github.workflow }}::${{ github.event.pull_request.number > 0 && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}${{ github.ref_name == 'main' && format('::{0}', github.run_id) || ''}}
  cancel-in-progress: ${{ github.ref_name != 'main' }}
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        bazel_version: ["8.x", "9.x"]
    runs-on: ubuntu-latest
    name: Build root with Bazel ${{ matrix.bazel_version }}
    steps:
      - uses: actions/checkout@v5
      - name: Mount Bazel caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel-repo
          key: bazel-cache-ubuntu-latest-${{ matrix.bazel_version }}-root-${{ hashFiles('**/BUILD.bazel', '**/*.bzl', 'MODULE.bazel') }}
          restore-keys: |
            bazel-cache-ubuntu-latest-${{ matrix.bazel_version }}-root
      - name: bazel build //...
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        shell: bash
        run: |
          REMOTE_HEADER_ARGS=()
          if [[ -n "${BUILDBUDDY_API_KEY:-}" ]]; then
            REMOTE_HEADER_ARGS=(--remote_header="x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}")
          fi

          bazel \
            --bazelrc="$GITHUB_WORKSPACE/.github/workflows/ci.bazelrc" \
            --bazelrc=.bazelrc \
            build \
            "${REMOTE_HEADER_ARGS[@]}" \
            //...
  test:
    strategy:
      fail-fast: false
      matrix:
        bazel_version: ["8.x", "9.x"]
    runs-on: ubuntu-latest
    name: Test smoke with Bazel ${{ matrix.bazel_version }}
    steps:
      - uses: actions/checkout@v5
      - name: Mount Bazel caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel-repo
          key: bazel-cache-ubuntu-latest-${{ matrix.bazel_version }}-smoke-${{ hashFiles('**/BUILD.bazel', '**/*.bzl', 'MODULE.bazel', 'e2e/smoke/MODULE.bazel') }}
          restore-keys: |
            bazel-cache-ubuntu-latest-${{ matrix.bazel_version }}-smoke
      - name: bazel test //...
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        working-directory: e2e/smoke
        shell: bash
        run: |
          REMOTE_HEADER_ARGS=()
          if [[ -n "${BUILDBUDDY_API_KEY:-}" ]]; then
            REMOTE_HEADER_ARGS=(--remote_header="x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}")
          fi

          bazel \
            --bazelrc="$GITHUB_WORKSPACE/.github/workflows/ci.bazelrc" \
            --bazelrc=.bazelrc \
            test \
            "${REMOTE_HEADER_ARGS[@]}" \
            --define=qemu_system_target=x86_64 \
            //...
          bazel \
            --bazelrc="$GITHUB_WORKSPACE/.github/workflows/ci.bazelrc" \
            --bazelrc=.bazelrc \
            test \
            "${REMOTE_HEADER_ARGS[@]}" \
            --define=qemu_system_target=riscv64 \
            //:qemu_system_riscv64_qmp_smoke_test
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pre-commit/action@v3.0.1
  conclusion:
    needs: [build, test, pre-commit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: technote-space/workflow-conclusion-action@45ce8e0eb155657ab8ccf346ade734257fd196a5 # v3.0.3
      - name: report success
        if: ${{ env.WORKFLOW_CONCLUSION == 'success' }}
        working-directory: /tmp
        run: echo ${{ env.WORKFLOW_CONCLUSION }} && exit 0
      - name: report failure
        if: ${{ env.WORKFLOW_CONCLUSION == 'failure' }}
        working-directory: /tmp
        run: echo ${{ env.WORKFLOW_CONCLUSION }} && exit 1
